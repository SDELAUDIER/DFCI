<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des Accès Pompiers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #map { height: 600px; margin-bottom: 20px; }
    button { padding: 10px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h1>Carte des Accès Pompiers</h1>
  <div id="map"></div>
  <button id="save">Enregistrer dans Grist</button>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script>
    // 1. Initialiser la carte
    const map = L.map('map').setView([50.5, 2.3], 10); // Centré sur le Pas-de-Calais
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // 2. Ajouter l'outil de dessin
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: {
        polygon: false,
        rectangle: false,
        circle: false,
        marker: true,
        polyline: true
      }
    });
    map.addControl(drawControl);

    // 3. Récupérer l'ID depuis l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');
    console.log("ID Grist:", recordId);

    // 4. Écouter les événements de dessin
    map.on(L.Draw.Event.CREATED, function (e) {
      const layer = e.layer;
      drawnItems.addLayer(layer);
    });

    // 5. Bouton "Enregistrer" : Envoyer les données directement à Grist
    document.getElementById('save').addEventListener('click', async () => {
      const geoJsonData = drawnItems.toGeoJSON();
      console.log("Données GeoJSON:", geoJsonData);

      // Configuration de l'API Grist
      const GRIST_API_KEY = "5c7a5728490c0d81551d873c1aaec2388aa29b72"; // Remplacez par votre clé API
      const GRIST_DOC_ID = "1i1JSABDkpF8"; // Remplacez par l'ID de votre document
      const url = `https://api.getgrist.com/api/docs/${GRIST_DOC_ID}/tables/DFCI/records`;

      try {
        const response = await fetch(url, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GRIST_API_KEY}`
          },
          body: JSON.stringify({
            records: [{
              id: recordId,
              geojson: JSON.stringify(geoJsonData) // Convertir GeoJSON en chaîne de caractères
            }]
          })
        });

        if (response.ok) {
          alert("Données enregistrées dans Grist avec succès !");
        } else {
          const error = await response.text();
          alert("Erreur lors de l'enregistrement: " + error);
        }
      } catch (error) {
        alert("Erreur: " + error);
      }
    });
  </script>
</body>
</html>
