<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des Accès Pompiers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #map { height: 600px; margin-bottom: 20px; }
    button { padding: 10px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h1>Carte des Accès Pompiers</h1>
  <div id="map"></div>
  <button id="save">Enregistrer dans Grist</button>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script>
    // 1. Initialiser la carte
    const map = L.map('map').setView([50.5, 2.3], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 2. Ajouter l'outil de dessin
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: {
        polygon: false,
        rectangle: false,
        circle: false,
        marker: true,
        polyline: true
      }
    });
    map.addControl(drawControl);

    // 3. Récupérer l'ID depuis l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');
    console.log("ID Grist:", recordId);

    // 4. Événement de dessin
    map.on(L.Draw.Event.CREATED, function (e) {
      drawnItems.addLayer(e.layer);
    });

    // 5. Bouton "Enregistrer" → appel backend PythonAnywhere
    document.getElementById('save').addEventListener('click', async () => {
      const geoJsonData = drawnItems.toGeoJSON();
      console.log("Données GeoJSON:", geoJsonData);

      try {
        const response = await fetch('https://votre_nom_dutilisateur.pythonanywhere.com/api/save', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            records: [{
              id: recordId,
              geojson: JSON.stringify(geoJsonData)
            }]
          })
        });

        if (response.ok) {
          alert("Données enregistrées dans Grist avec succès !");
        } else {
          const error = await response.text();
          console.error("Erreur détaillée:", error);
          alert("Erreur lors de l'enregistrement: " + error);
        }
      } catch (error) {
        console.error("Erreur réseau:", error);
        alert("Erreur réseau: " + error);
      }
    });
  </script>
</body>
</html>
